name: eqms
description: "OilDri EQMS Application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_native_splash: ^2.4.8
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  dio: ^5.10.0
  flutter_bloc: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/urbanist.ttf
        - asset: assets/fonts/urbanist.ttf
          weight: 700
        - asset: assets/fonts/urbanist.ttf
          weight: 600
        - asset: assets/fonts/urbanist.ttf
          weight: 500
        - asset: assets/fonts/urbanist.ttf
          weight: 300

    - family: Viga
      fonts:
        - asset: assets/fonts/viga.ttf
          weight: 300
